{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="panel text-center shadow">
            <div class="panel-header d-block border-0 mb-0 pb-0">
                <i class="fas fa-user-circle d-block mb-3 mx-auto" style="font-size: 3.5rem; color: var(--accent-purple);"></i>
                <h2 class="panel-title fs-3">Iniciar Sesión</h2>
            </div>
            
            <form method="POST" class="mt-4 text-start">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-custom alert-danger-custom mb-4 px-3 py-2">
                        <i class="fas fa-exclamation-circle me-2" style="color: var(--accent-red)"></i> Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                {% for field in form %}
                    <div class="mb-4">
                        <label for="{{ field.id_for_label }}" class="d-block mb-2">
                            {{ field.label }}
                        </label>
                        <div class="auth-field">
                            {{ field }}
                        </div>
                    </div>
                {% endfor %}

                <div class="d-grid mt-5">
                    <button type="submit" class="btn-pastel-purple w-100 fs-5 py-2">
                        <!--* Boton nativo con colores del sistema -->
                        <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                    </button>
                </div>
            </form>
            
            <div class="mt-4 text-center border-top pt-4" style="border-color: var(--border-color) !important;">
                
            </div>
        </div>
    </div>
</div>

<style>
    /* Forzar los inputs al estilo del panel (form-control es un class the bootstrap que django no aplica a menos que usemos django-widget-tweaks) */
    .auth-field input {
        width: 100%;
        background-color: var(--bg-main) !important;
        border: 1px solid var(--border-color);
        color: var(--text-primary) !important;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        transition: border-color 0.25s, box-shadow 0.25s;
    }
    .auth-field input:focus {
        border-color: var(--accent-purple);
        outline: none;
        box-shadow: 0 0 0 3px rgba(196, 181, 253, 0.15); 
    }
</style>
{% endblock %}
